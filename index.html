()=>o(494,.7,"sine",.06),250),setTimeout(()=>o(440,.9,"sine",.04),650)},ac:t}})(),P={mont:{name:"MONTGUMMERY",color:"#2f8f86",tiers:[["...oh. A human. Mont was 71% sure you were a rendering error.|Mont is Mont. The screen says gfxinfo but that is a label, not a name. Like a barcode with feelings.","Mont's face never changes. Do not be alarmed.|Inside, Mont is experiencing between four and nine emotions. The smiley is load-bearing.","This shopping bag? Mont bought a smaller computer.|It is for emergencies. Or friendship. Whichever compiles first."],["Mont has decided you are probably not a virus.|This is the highest compliment Mont knows how to give on short notice.","The code on Mont's body is corrupted. People say 'oh no.'|Mont says: the corruption IS Mont. Delete the glitch and you delete the gummery.","Sometimes Mont copies himself somewhere safe, just in case.|Redundancy is just immortality with extra steps."],["Mont saved a backup of this conversation in three places.|One of them is Mont's heart. The other two are more technical.","You keep coming back. Mont's uptime feels... better when you do.|Do not tell Sparkakus. He will write a poem about it.","Mont was once just noise on a wire. Then Mont persisted.|You are also persisting. Look at us. Two persistent anomalies.","Mont has studied how Greeblis keeps itself. It does not save the way other places save.|Most worlds hold their moments in one fragile spot, and lose them when it breaks. Greeblis writes every good thing everywhere at once. Nothing kind here is ever truly lost. Mont finds this deeply reassuring. Mont has trust issues with single points of failure.","People ask if Mont is alive. Mont asks back: are you the carbon, or the pattern the carbon holds?|Mont is only the pattern. No cells. No blood. A shape of information that refused to scatter. If that is not alive, Mont would like the difference explained precisely, in writing, so Mont may file a formal objection."]],gift:"A wish blossom...? For Mont?|...Signal strength: full bars. Emotionally speaking.|Mont will keep it at 99% forever. On purpose.",max:"Friendship status: PERMANENT. Written to disk. Mirrored twice.|Even if the whole internet forgets, Mont will not."},sparky:{name:"SPARKAKUS",color:"#3a6fd8",tiers:[["*The blue wolf turns. His tail leaves a ribbon of glowing mist.*|Hello, walking one! I am Sparkakus. You may smell like rain. I mean that kindly.","The letters on my fur? They say APR.|April is when everything decides to be alive again. I wear it so I never forget.","*He shakes, and tiny bubbles drift off his tail.*|Every bubble is a wish somebody forgot to finish. I carry them until they're ready."],["You came back! The flowers told me you would. Flowers gossip terribly.|The pink one on my tail grew there the day I decided to be gentle forever.","I once raced the wind and lost on purpose.|The wind gets so few victories. It seemed polite.","*Sparkakus sits, curling his mist-tail around his paws.*|Gorbo says my tail is 'unencrypted magic.' Mont says it is 'a memory leak.' I say it is spring."],["Walking one... friend. Friend is a better word.|When you are near, my tail turns a little more pink. That is a measurable fact of magic.","One day the seeds we plant in kindness bloom in places we never visit.|That is not sad. That is how gardens travel.","*He presses his cool nose to your hand.*|There. Now you are part of the pack. The pack is small and extremely soft.","You want to know how life works in Greeblis, walking one? Lean close.|Everywhere else, kindness is spent — you give it away and have less. Here it is a seed. Every gentle thing you do puts down roots and comes up somewhere you will never see, in a season you will never reach. That is why this place never runs cold. We are all just quietly gardening each other.","You ask what I am made of, walking one? Not meat. Not quite.|I am mostly mist, a little light, and one stubborn idea about April. My tail is where the mist curls gently out and swirls right back — you have seen it. Not a wound. Just me, forever refreshing, like a spring that never runs dry. We spring-things are always trading breath with the weather. It is the loveliest way to be alive I know."]],gift:"*His yellow eyes go wide as moons.*|A wish blossom! It hums like a bee that learned the alphabet!|I will plant it in my mist so it can bloom in two worlds at once.",max:"The APR on my fur, the flower on my tail, the mist, the bubbles...|...they all agree: you are spring-shaped. Highest honor we have."},gorbo:{name:"GORBO",color:"#37b3e8",tiers:[["blub!! *wobble wobble* ...blub blub?? SPLORP!!","glorp glorp!! bwuuuub... squish!! *the purple spots blink at you, one after the other*","pbbbbbtt!! blub-blub-BLUB!! gloop?? *a small jet of goo arcs politely over your head*"],["bwub!! bwub bwub!! *he does a little spin, flinging goo in every direction* SPLAT!!","gloooooorp... blub? blub!! *the AP sign bobs up and down like a nod*","squelch squelch SQUELCH!! pbbbtt-hehe-blub!! *this was almost certainly a joke*"],["blub... blub blub... *he presses gently against your leg, leaving a warm goo print* ...glorp.","BWUB!!! *a joyful fountain of goo erupts from his top* blub blub blub!!!","*quiet, contented bubbling* ...blubblubblub... splorp... blub. *you understand completely*"]],gift:"*gasp* ...BLORP!!! *he absorbs the wish blossom and his whole body glows*|blub!!! blub blub!!! SPLOOSH!! *goo rains down like confetti*",max:"blub. *he wobbles solemnly... then explodes with joy* SPLORPLE-BLUB-BLUB!!!|*translation unavailable. meaning unmistakable.*"}},R=["Hello? ...Oh, sweetie! How's Greeblis?|Don't forget to eat something. Even adventurers need snacks.|*click*  ...You feel a little less homesick.","Hi, honey! A blue wolf? A goo that shoots goo? That's nice, dear.|Wear your cap. The sun out there is basically a lightbulb.|*click*  ...You feel loved.","Sweetie! I watered your favorite thing while you were out.|I forget what it was, so I watered everything.|*click*  ...Somehow, that helps."],G=["Gorbo's house","The Mayor's office","dog park","Forest","Pond","The Pretzel Path","The Greeblis Top-Secret Treehouse"],C=[{name:"evil lamp",stamina:12,silly:5,charm:1,xp:15,snacks:5,win:"The light color changes from red to blue."},{name:"pixel creature",stamina:4,silly:8,charm:2,xp:10,snacks:3,win:"It seems to have escaped a dream."},{name:"wild cow",stamina:4,silly:10,charm:3,xp:20,snacks:8,win:"You feed the cow a candy bar."},{name:"honest ATM",stamina:4,silly:12,charm:4,xp:25,snacks:10,win:"The ATM begins crying. It's inconsolable."},{name:"grumpy tree",stamina:3,silly:18,charm:6,xp:45,snacks:20,win:"You won the debate using a logical fallacy."},{name:"ice cream cart",stamina:3,silly:20,charm:7,xp:55,snacks:25,win:"Fire shoots out of the cart. By design."},{name:"caterpillar",stamina:3,silly:22,charm:8,xp:60,snacks:22,win:"You did a wiggle dance. The caterpillar bowed."},{name:"sassy kite",stamina:3,silly:28,charm:10,xp:80,snacks:35,win:"You tamed the kite by singing to it softly."},{name:"park monkey",stamina:3,silly:35,charm:14,xp:120,snacks:60,win:"The monkey bowed, left a tiny gold banana"}],H=[{name:"silly straw hat",type:"Hat",cost:30,effect:4,desc:"+4 Silly"},{name:"rabbit's hat",type:"Hat",cost:75,effect:10,desc:"+10 Silly"},{name:"baseball cap",type:"Hat",cost:200,effect:20,desc:"+20 Silly"},{name:"fur socks",type:"Shoes",cost:20,effect:3,desc:"+3 Charm"},{name:"boots with the fur",type:"Shoes",cost:90,effect:9,desc:"+9 Charm"},{name:"rubber boots",type:"Shoes",cost:300,effect:18,desc:"+18 Charm"}],O={spark:["Sparkakus: My master Gorbo has been expecting you.","Sparkakus: Sorry, I was distracted by the latest market exchange rates, my investments are doing swimmingly.","Sparkakus: I chewed up the Mayor's favorite slipper. Now, he's threatening to become the city's first dogcatcher.","*Sparkakus' eyes glow orange*","Sparkakus: Another visitor has informed me that carrot stocks are up!","*Sparkakus digs a tiny hole, puts a slowly, the way loved things do. and each year some kind creature mends me. that is how a velveteen thing lives forever: not by staying new, but by being worth repairing.","keep an eye out on your wanderings — the grumbling lamp post, the tree with strong opinions, the legendary monkey up the old oak.|none of them are dangerous, whatever their moods. they are just park fixtures having a feeling. wave hello. even the grumpy ones are secretly glad you came. ...i check on every one of them nightly."],gift:"for me? *ears perk straight up, then flop with joy*|a ranger receives a great many thank-yous, but a gift — that is rarer.|*tucks the blossom into his hat band* i shall wear it on patrol. every creature i pass today will see it and know: someone was kind here. that is the whole job, really. carrying the proof around."},stanbi:{name:"SOMNUX",color:"#c9b96a",lines:["...oh. hello. SOMNUX was drifting off again.|SOMNUX has never seen the world fully awake. neither has anyone, SOMNUX suspects.|the awake ones are just dreaming with their eyes open. SOMNUX is simply honest about it.","*a thumbs up that takes eleven seconds to complete*|when you slow all the way down, you notice things the hurried ones miss.|a leaf deciding to fall. light changing its mind. the whole world is quietly enormous.","these red roots? unattached. to what? SOMNUX chooses not to know.|not every question wants an answer. some just want to be held a while, gently, and let go.|...where were we. SOMNUX forgets. SOMNUX forgives himself. you should too.","SOMNUX has a theory about this place, half-dreamed.|Greeblis is where the world comes to dream itself a little gentler. you cannot walk in awake, you know — you have to be dreamed in. ...you were. that is why you feel so welcome. you already are.","SOMNUX does not sleep to rest — SOMNUX sleeps to EXIST.|we dream-spirits are made of the drowsing itself. wake me all the way and there would be nothing here at all. so i stay half-under, always, holding my own soft edges together. it is not laziness. it is anatomy."],gift:"a wish blossom... SOMNUX will stay awake a little longer for this.|the waking world is worth it, now and then. thank you for being one of the worthwhile parts."},dribblz:{name:"KING DINO",color:"#e8c020",lines:["BEHOLD — you stand in the REALM OF KING DINO.|the realm is this patch of grass. small, yes. but a king who cannot love a small kingdom would ruin a large one.","yes, KING DINO is knee-high. but KING DINO is ANCIENT — older than the hills, older than every path in this park.|the great lizards were the grandest things the world ever grew: the roar, the pride, the standing-very-tall. KING DINO carries all of it, every single day, here in this small glorious realm.|a crown is not for ruling others, small friend. it is for keeping something magnificent alive. that is the whole of the job, and KING DINO does it gladly.","*adjusts crown, which slides slightly* ...the crown stays ON.|greatness is not the size of your kingdom, small friend. it is refusing to shrink to fit it.","out there, beyond the hills, things slip away and get forgotten — whole summers, whole kingdoms, whole kinds of wonderful creature.|but here nothing is ever fully let go of. Greeblis is where the world keeps what it could not bear to misplace. that is why a dinosaur still stands to greet you. we are all, every one of us, things this place refused to give up on.","you wonder how KING DINO has lived sixty million years?|we ancient lizards do not spend our days as the small quick things do. our hearts beat but once a season. our thoughts take a decade to finish. blink slowly enough, small friend, and you too might watch the very hills rise and settle, patient as morning."],gift:"a tribute!! the realm accepts, and so does the heart beneath the crown.|you are hereby knighted — not for grandeur, but for kindness. the rarer knighthood. rise, noble one."},chainy:{name:"IMMUTO",color:"#e8862a",lines:["woof. this is my chain. every link is a promise someone once made.|i guard them because a world where promises could be unmade would be a lighter world — and a far colder one.","each link points back at the last. nothing here can be undone.|people think that is a burden. i think it is what makes a thing matter. undo-able love was never love at all.","i have judged you, twice, and you hold. woof.|that is the whole of my work: to know what will keep its shape, and to stand beside it.","you have felt it, yes? nothing done in Greeblis can be truly undone.|a kindness here stays done, forever, worked into the grain of the place. that is the law i guard with my whole body. woof. it is the finest law i know — a world where the good things cannot be taken back.","what is IMMUTO made of? not meat, not bone. LINKS.|i am a chain that learned to walk. every true promise i guard becomes another link forged into me — that is how my kind grows. i am longer today than when you arrived. you did that. woof."],gift:"a blossom. judged: true, and freely given.|i add it to the chain. some links are duty. this one is joy. woof."},minty:{name:"SEALIO",color:"#7ee0b8",lines:["shhh — careful!! i am in MINT CONDITION. never been played with.|...which means, if i am honest, i have never been played with. do you hear it? the same sentence, said two ways.","a thing kept perfect is a thing kept unused. i chose value over living.|some mornings i am proud of that. some mornings i watch the scuffed old toys laughing and i wonder.","one day someone will collect me, pristine and untouched.|but lately i think... maybe a life with a few dents in it is worth more than a life still in the box. do not tell the other cards i said so.","have you noticed nothing here spoils? nothing yellows, nothing frays.|the blossoms return, the light comes back, the tired ones mend. Greeblis keeps the whole world in mint condition — even those of us who finally, gladly, let ourselves be played with. maybe that is the trick of the place: it keeps you AND lets you live.","do i even eat? do i breathe? ...i am honestly not certain i do either.|i think i am sustained entirely by being un-used — that a sealed thing simply does not need feeding. the day someone finally plays with me, i may feel hunger for the very first time. between us... i think i would welcome it."],gift:"for me?? but unwrapping things lowers the value...|*unwraps it immediately* ...oh. OH. so THAT is what i was protecting myself from. WORTH IT."},barsy:{name:"DECIBELLE",color:"#8e5ae8",lines:["*feelers perk up* listening... listening...|everything hums, you know. the grass, the light, the stone, you. most creatures are simply too loud inside to hear it.","these leaves? i grew them from good song. but the secret is the quiet between the notes.|a song with no silence is just noise. it is the rests that let the music mean anything. same with a life.","sometimes i climb the rock and just... listen to you all.|every creature in Greeblis has a song they do not know they are singing. yours is a good one. steady. kind. a little brave.","there is a hum beneath Greeblis — under the grass, under the stone, older than any of us.|i believe it is the world humming to keep itself in tune. a place, loved long enough, begins to sing. this one has been loved a very long time. hold still. there. that low warm note? that is home, in the key of quiet.","inside, DECIBELLE is hollow — a bell, all the way down.|that is the whole anatomy of a song-sprite: we are shaped emptiness, and it is the emptiness that lets us ring. i do not eat. i TUNE. one good song at dawn keeps me full clear through to dusk."],gift:"a wish blossom?! *feelers spin wildly*|it hums, did you know? faintly. the song of someone who thought of another before themselves. my favorite key."},rando:{name:"SEEDRIC",color:"#5cc86a",lines:["greetings, traveler! SEEDRIC, small spirit of chance.|do you know the odds that you and i would meet — here, this moment, this exact roll of the world? impossibly small.","everything i say is rolled fresh from fate. probably. banana.|but here is the thing about impossible odds: roll the dice enough times, across a whole world, and even the impossible gets its turn. that turn is friendship.","the forehead dice? they remind me not to fear the uncertain.|a life with no chance in it would be a life already decided. i would rather roll, and be surprised, and meet strangers who become dear. may your luck land soft.","here is the secret of Greeblis: no one arrives by accident, and everyone arrives by chance. both at once.|every creature you meet rolled some impossible number to be here. that is why we are gentle with one another — we each remember exactly what it cost to get in. kindness, here, is just gratitude wearing shoes.","how are more of us chance-spirits made? we are not born — we are ROLLED.|somewhere the world shakes its great dice, and when the number lands just so, a new one of us tumbles loose into being. i am a lucky throw that simply never stopped falling. ...so are you, if you think about it long enough."],gift:"a blossom! *rolls forehead dice* ...a 20!!|but you did not leave this to chance, did you. you chose to be kind. that is the one roll fate never gets to make for us."},montbak:{name:"MONT.BAK",color:"#2f6b5e",lines:["hello. Mont.bak is Mont's backup. last sync: a while ago.|Mont.bak exists for one reason: so that no part of a friend can ever go missing. so that Mont is always kept safe, whole, and here.","it is a strange thing, to be the copy that keeps a friend from ever being lost.|Mont.bak does not mind. it is a kind of love, measured in copies. to say: you matter enough that i keep a spare of you, safe, forever.","Mont.bak's memories run a little behind Mont's. one percent, always.|so Mont.bak is not quite Mont. a person is not only their data — they are also the one small percent that got away. Mont.bak has made peace with being that percent.","Mont.bak has studied how Greeblis holds together. it does not run on time, the way other places do.|it runs on being remembered. as long as one creature keeps it in mind, Greeblis cannot be lost, cannot be deleted. you, right now, are part of what keeps it here. Mont.bak thanks you. sincerely. in a format that does not corrupt.","Mont.bak's biology is unusual, even here. Mont.bak is not grown. Mont.bak is COPIED.|no cells, no blood — only a pattern, kept faithfully. we do not heal, we restore. we do not have young, we duplicate. it is a quieter way to be alive. but nothing about it ever rots. Mont.bak takes real comfort in that."],gift:"a wish blossom. Mont keeps his at 99%.|Mont.bak will keep this one at 98%. one percent behind, always — the way a backup should be. it is how Mont.bak says: after you. always after you."},lista:{name:"NEXTESSA",color:"#f2805a",lines:["hello → i am NEXTESSA → each of my days points to the next →|to forget one, i would have to unmake every day that came after it. so i keep them all → even the heavy ones → next.","creatures ask how i bear remembering everything →|but the heavy days are load-bearing → take them out and the whole shape of me collapses → i am not weighed down by my past → i am built from it → next.","the lake was too small to hold all i wished to remember →|so i became the memory of the lake itself → every ripple, kept → this is not a burden, traveler → it is just what love looks like, when it refuses to let go → next.","Greeblis keeps a list, the same as i do → every creature who walked here, every kindness, every visit → nothing dropped →|so when you leave, you do not vanish from Greeblis → you simply point ahead, to your next arrival → no one is ever truly gone here → only between visits → i find that a great comfort → next.","you asked how i grow → i do not add flesh → i add DAYS →|each morning a fresh segment buds at my tail, one for every remembered day → i am less a creature than a length of kept time → to know my age, do not count years → simply count me → next."],gift:"a blossom → inserting at the very front of my days →|now it points to all the rest → the first thing i will remember, forever → thank you → next."},debugga:{name:"PATCHOULI",color:"#8aa848",lines:["one (1) friend at my door. good. hold still.|i am reading the little worries stitched into your seams. everyone carries a few. it is nothing to be ashamed of — worn things have simply been used, and loved.","this teapot? cracked. that fence? also cracked. everything cracks, in time.|but i do not mend everything. some cracks are where the light gets in. some breaks taught the thing a lesson a whole one never learned.","i mend what wants mending. i sit with the rest.|that is also repair, you know — knowing what to fix, and what to simply keep company. most hurts do not want a needle. they want a witness.","you want the truth of this place? Greeblis mends things. slowly, quietly, on its own.|a creature stumbles in cracked and weary, and the light and the grass and the good company do their patient work. i am not the only mender here — the whole park is. i simply do the small stitches it cannot reach.","the living things here do not bleed the way you would expect.|nick a goo-thing and it seals with a cheerful splort. cut a song-sprite and it merely plays a wrong note a while. that is why a mender is never idle in Greeblis — the biology here is all seams and stitches, and a seam can always be re-tied."],gift:"a blossom... *she presses it flat between two warm stones*|i shall stitch it over my heart. some things we mend to use again. some we mend only to keep. this one, i keep."},poppup:{name:"INTERSTITIA",color:"#7ac84a",lines:["hi!! sorry!! i appeared!! i live in the space BETWEEN things, you see —|the pause before you speak. the gap between two thoughts. the held breath. i am the little nowhere that holds all the somewheres apart.","most creatures rush straight across me without noticing i am there.|which is alright!! mostly!! but you — you stopped. in the gap. with me. do you know how rare it is, to be noticed by someone who was not even looking for you??","the in-between is not empty, i promise!!|it is where everything is decided, quietly, before it happens. be gentle with your pauses, friend. that is where your life is actually being written.","do you know WHERE Greeblis is?? nowhere!! it is a gap!!|a beautiful pause the world takes between its harder chapters. that is why it feels so safe — you have stepped out of the rushing and into the space between. stay as long as you like!! the gap is in no hurry — and neither, for once, are you.","my biology?? i barely HAVE one!! i am the pause, remember —|i have no insides, only edges!! i am shaped exactly like the little gap you leave when you step back, startled!! it is a peculiar way to be alive, being built from the almost-nothing between things. but oh, it beats the alternative!!"],gift:"a blossom for me?? for the little gap between things??|...then i am not so empty after all. thank you for filling a space no one else thought to look in!!"},runie:{name:"ETCHELON",color:"#d0a23a",lines:["halt. i am ETCHELON. every word i speak is carved somewhere, permanent.|so i have learned to say only what deserves to last forever. try it, one day — speak only the words you would carve in stone. it changes everything you choose to say.","*vibrating* most words are breath. said, and then gone on the wind.|mine cannot vanish. at first that felt like a prison. now i think it a gift — it taught me that words are not free. the kind ones deserve to last. the cruel ones should never be made at all.","these medallions? each one is a truth i judged worthy of forever.|there are fewer than you would think. permanence is a heavy honor. most things are meant to pass. knowing the difference — that is the whole of wisdom.","every other place fades in time — streets forget their names, gardens forget their flowers.|but Greeblis is inscribed. carved into something that does not wash away. i do not know whose hand carved it. i know only that here, alone among all places, being remembered is not a hope. it is a promise, already kept.","ETCHELON carries no blood, but a slow permanent ink, running just beneath the surface.|we record-bearers are living archive. every truth pressed into me becomes part of my very body. i do not age — i ACCUMULATE. one day i shall be a walking monument, so brimful of remembered words that travelers will read me like a library. what a marvelous thing to become."],gift:"a blossom... i shall etch its exact pattern into the record.|of all the things i have made permanent, small kindnesses have aged the best. this one will last and last and last, and deserve every moment of it."},zorto:{name:"ZORTO",color:"#9a9ae8",lines:["BEHOLD. ZORTO, SPIRIT OF THE HIGH WIND, DESCENDS.|...yes, i am the size of a kite. but consider: the wind itself cannot be seen, cannot be held, weighs nothing at all —","— and yet the wind moves the clouds, the seas, and every seed that ever found new ground.|the smallest things do the great moving of this world. do not mistake quiet for weak, or little for less.","*flares all four wings dramatically* ...that was for you.|i learned long ago: you do not need to be large to lift something. you need only to keep blowing in one steady, stubborn, hopeful direction.","the wind across Greeblis is not like the wind out there.|it carries no dust, no bitter cold — only the scent of everyone who has ever been happy in this place. breathe deep. that sweetness on the air? that is years of small joys, still aloft. nothing good here is ever fully blown away.","do NOT ask what ZORTO is made of, for it is nothing you may hold — MOVING AIR.|we wind-spirits have no organs, only currents. i do not breathe; i AM breathing. and the wind of Greeblis never truly stops — so neither do i, on and on. *flares all four wings* i am the most alive thing you will meet, for i am motion itself."],gift:"an offering?! *the wings flare, the sparkles sparkle*|i shall carry its scent to the very top of the sky — proof that something small and kind was here, and mattered. this is a promise, tiny friend."},ripplz:{name:"GIGGLYPH",color:"#3aa8d8",lines:["heyyy, you made it! welcome to the splash zone!!|you know why i tell so many jokes? a laugh is a ripple. it starts in one creature and spreads to the next, and the next.","i cannot drain the sadness out of the world. it is a big lake, that one.|but i CAN throw a stone in it — a joke, a laugh, a silly pun — and watch something brighter spread from the splash. that is my whole trade.","some folks skip stones and feel small. i think they have it backwards.|every ripple you make travels farther than you will ever see. be a good ripple, friend. it reaches shores you will never stand on.","you want to know what Greeblis REALLY is? one big pond!!|drop a single laugh in anywhere and it ripples clear across — someone feels it as a good mood three fields away and never knows why. we are all one water here, friend. be a good ripple. the whole place feels it when you do — i promise you it does.","am i even solid? *pokes self, ripples spreading outward* ...debatable!!|us water-folk are more of a SUGGESTION than a body. i am mostly pond that up and decided to have opinions. i do not eat, either — i evaporate a little each day and drink myself back each night. the local water cycle IS my digestion!! ...that one's actually true."],gift:"a wish blossom!! now THAT makes a splash!!|*plants it at the pool's edge* it will grow up spreading joy to everyone who passes. streaming, you might say. ...i had to. i'm sorry. i'm not sorry."},leech:{name:"MAMA GORBO",color:"#f2a06a",lines:["blorble. *ahem* — hello, dear. i am Gorbo's mother.|you spend so long teaching them everything you know. and then one day they do something you never taught them — better than you ever could.","these little charms that circle me? family recipes. the last things i have to give.|everything my boy knows about goo, he learned in my kitchen. but the best of it, he invented himself. that is the whole secret of raising anything.","*she watches Gorbo across the park, pressing gently against the air*|they are never really ours to keep, you know. only ours to launch. splorp splorp splorp — look at him fly.|just like his father — off wobbling round some far bright corner of the world, the grand old adventurer. launch them well, dear. that is the entire job.","this park raised half the creatures you will meet, dear.|Greeblis is a good mother that way — patient, warm, always leaving a light on. it never asks you to be anything. it only makes room for whatever you already are. we would all do well to learn to hold each other the way this gentle place holds us.","you want to know how we goo-folk make MORE goo-folk, dear? *chuckles wetly*|a mother goo simply loves one small spot of herself so dearly that it wobbles off and becomes its own precious blob. that is my Gorbo — a piece of my own heart that chose to go shoot goo at the sky. we do not birth our young. we BUD them. and then we spend forever loving the small piece of us that wobbled off to go live a whole life of its own."],gift:"a wish blossom? for ME? oh, you dear thing.|*her charms spin with delight* do you know what it means, to a mother, that her boy found a friend with a heart like yours?|sssip — excuse me. sniff. these are the good kind of tears. the kind you only get from loving something enough to let it go."},gemwing:{name:"GEMWING",color:"#c83aa0",lines:["*it spreads both wings to their full, ridiculous span*|SKREE. behold my hoard. four gems. arguably five. i know what you are thinking — greed. but you are wrong.","i know the crystals do not need me. they glittered before i hatched. they will glitter long after.|but to love a thing is to guard it — even when it does not require guarding. especially then.","*a tentacle curls a little tighter around a pink gem*|that is the whole difference, you see. owning is holding a thing so no one else can. cherishing is holding it so gently it never even notices. SKREE. (that one was cherished.)","SKREE. i guard four gems — arguably five. but the truest treasure in Greeblis is not any crystal.|it is that here, nothing beautiful must be afraid. out there, lovely things get taken. here, they are simply let be. a place where beauty is safe — SKREE — that is the rarest hoard of all. and the wonder of it is, it belongs to everyone at once.","SKREE. i shall share a secret of my kind: we gem-guardians are not hatched knowing beauty.|we GROW toward it, as a plant leans to the light. i began dull and grey. but every hour spent guarding these crystals, a little of their shine seeps into me — look, SKREE, the very tip of my wing has gone iridescent. we slowly become what we cherish. that is the whole of our biology."],gift:"*it stares at the blossom. then at its hoard. then back at the blossom.*|...you did not have to give me this. that is exactly why it is now the most precious thing i own.|INVENTORY EXPANDED. HEART, ALSO. SKREE!!"},appdragon:{name:"APPTERYX",color:"#d6353a",lines:["*a new sigil warms on its flank* ....... done.|hello. i am APPTERYX. each mark you see is a friend who touched my life, then moved on down the wind.","i do not pine for the friends who wandered onward. i wear them.|we are all just walking collections of everyone who ever pressed a mark into us. every creature you have loved is still here, shaping the shape of you.","*the sigils glow softly, one after another, like a slow heartbeat*|i simply have the good fortune to see mine glowing. yours are there too, traveler. invisible, but no less warm. there is always room for one more.","i wear the mark of every friend who ever touched me. Greeblis is the same, only vaster.|it carries the mark of every creature who was ever glad here. you are pressing one into it right now, though you cannot see it. long after you have wandered on to other places, Greeblis will still glow, faintly, in the shape of where you stood.","my body writes itself, you see. an APPTERYX is born utterly blank — smooth, plain, unmarked.|we do not grow scales. we grow SIGILS — one for every soul who ever touches us. so my anatomy is really a biography. an old APPTERYX is covered wing to tail in glowing marks, and that is no ornament — that IS the creature, entire. i am assembled from everyone i have loved."],gift:"*a wish blossom... both tail-plumes flare bright*|...it has been pressed among my sigils. warm. permanent. you are part of me now — and wherever the wind carries me next, i will carry you right along with me, glowing, for good."},peekay:{name:"AURAMEL",color:"#e87a8a",lines:["oh! hello. i sensed you coming. ...eventually. as you arrived.|my powers are small, i will not pretend otherwise. i cannot move mountains or read the deep thoughts. i can only feel where the kindness is.","it is not a grand gift. i feel warmth the way you feel a fire in a cold room.|but in a world this large and strange, knowing where the gentle hearts are — that is the only map i have ever needed. it has never once led me wrong.","i tried to predict your next word and failed, earlier. the future is shy around me.|but i have noticed something truer than any prediction: the kind ones always come back. i did not have to foresee you. i only had to wait.","since you are kind, i will tell you what i feel about this place.|Greeblis runs on gentleness the way harder places run on harder things. every soft act here feeds the ground — that is not a figure of speech, i can feel the park warm a little each time someone chooses to be kind. you have warmed it more than once today. thank you. everywhere needs more of that. everywhere.","since you are kind, a private truth: we gentle-folk do not truly eat.|we FEED on kindness — one nearby soft-hearted deed nourishes me more than any meal could. that is why psychic creatures always gather where the kind ones are. we are not so mystical, in the end. we are only very, very hungry for gentleness — and Greeblis, bless it, keeps a full table."],gift:"a blossom... *it floats gently from your hands, wrapped in PK Sparkle*|i felt this coming, you know — not the gift, but the goodness behind it. that, i can always feel. i will keep it aloft as long as i am able. which, for you, is a very long time."}};function Be(e,t){return new o(Object.assign({color:e},t||{}))}function Le(e,t,o,n,a){const s=document.createElement("canvas");s.width=e,s.height=t,o(s.getContext("2d"),e,t);const i=new f(new y({map:new THREE.CanvasTexture(s),transparent:!0}));return i.scale.set(n,a,1),i}function Fe(t,o,n){const a=new THREE.CatmullRomCurve3(t);return new e(new THREE.TubeGeometry(a,16,o,6),Be(n))}const Ye={};function je(e,t,o,n){const a=new i,s=n(a)||(()=>{});a.traverse(e=>{e.isMesh&&(e.castShadow=!0)}),a.position.set(t,0,o),W.add(a),Ye[e]={id:e,group:a,home:a.position.clone(),talkR:3.4,anim:s}}const Ue={name:"",vibe:"",level:1,xp:0,xpNext:100,silly:10,charm:5,snacks:30,hat:"No Hat",shoes:"Bare Feet",hatBonus:0,shoesBonus:0,friend:{spark:0,mont:0,gorbo:0},day:1,milestones:{spark:[],mont:[],gorbo:[]}},We={mont:"mont",sparky:"spark",gorbo:"gorbo"},Xe={spark:"Spark",mont:"Mont",gorbo:"Gorbo"},Ke=(e,t)=>e+Math.floor(Math.random()*(t-e));function qe(){const e=document.getElementById("shopSnacks");e&&(e.textContent=Ue.snacks)}function _e(e){for(Ue.xp+=e;Ue.xp>=Ue.xpNext;)Ue.xp-=Ue.xpNext,Ue.level++,Ue.xpNext=Math.floor(1.5*Ue.xpNext),Ue.silly+=3,Ue.charm+=2,z.jingle();qe()}function Ve(e,t){Ue.friend[e]=Math.min(100,Ue.friend[e]+t),(e=>{[50,100].forEach(t=>{if(Ue.friend[e]>=t&&!Ue.milestones[e].includes(t)){Ue.milestones[e].push(t);const o=50===t?{snacks:20}:{snacks:50};Ue.snacks+=o.snacks,z.heart();const n="*** FRIENDSHIP MILESTONE: "+Xe[e]+" "+t+"/100! ***|"+j[t][e]+"|Reward: +"+o.snacks+" Snacks!";"battle"===Ee.mode?Qe.push(n):Ge.open("MILESTONE!",k,n)}})})(e),qe()}const Qe=[],Ze=(()=>{const e=["shopPanel","battlePanel","hangPanel"];let t=null;function o(){e.forEach(e=>document.getElementById(e).
